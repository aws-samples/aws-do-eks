apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: efa-installer
  namespace: kube-system
  labels:
    app.kubernetes.io/name: "efa-installer"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: "efa-installer"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "efa-installer"
      name: "efa-installer"
    spec:
      hostPID: true
      hostNetwork: true
      nodeSelector:
        node.kubernetes.io/instance-type: "p5en.48xlarge"
        #processor: gpu
      initContainers:
      - name: "installer"
        image: "ubuntu:24.04"
        env:
        - name: EFA_INSTALLER_VERSION
          value: "latest"
        - name: REINSTALL
          value: "N"
        #command: ["bash", "-c", "while true; do date; sleep 10; done"]
        command: ["nsenter", "--target", "1", "--mount", "--uts", "--ipc", "--net", "--pid", "--","bash", "-c", "echo  | base64 -d > /tmp/install-efa.sh; chmod +x /tmp/install-efa.sh; /tmp/install-efa.sh"]
        securityContext:
          privileged: true
          runAsNonRoot: false
          runAsUser: 0
      containers:
      - name: "monitor"
        image: "ubuntu:24.04"
        command: ["nsenter", "--target", "1", "--mount", "--uts", "--ipc", "--net", "--pid", "--", "/bin/bash", "-c"]
        args: 
        - |
          while true; do 
            echo "efa installer pod is alive on $(date)"
            echo "EFA devices:"
            /opt/amazon/efa/bin/fi_info -p efa
            sleep 300
          done
        securityContext:
          privileged: true
          runAsNonRoot: false
          runAsUser: 0

