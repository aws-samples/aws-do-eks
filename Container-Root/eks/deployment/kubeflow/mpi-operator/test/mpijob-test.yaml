apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: mpijob-test
spec:
  slotsPerWorker: 1
  runPolicy:
    cleanPodPolicy: Running
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          containers:
            - name: launcher
              image: mpioperator/mpi-pi:openmpi
              command:
                - mpirun
              args:
                - -n
                - "2"
                - --allow-run-as-root
                - bash
                - -c
                - "echo -e '\n\n-------------' && ls -alh / && df -h && echo -e '\n'"
              resources:
                limits:
                  cpu: 500m
                  memory: 256Mi
    Worker:
      replicas: 2
      template:
        spec:
          containers:
            - name: worker
              image: mpioperator/mpi-pi:openmpi
              resources:
                limits:
                  cpu: 500m
                  memory: 256Mi

