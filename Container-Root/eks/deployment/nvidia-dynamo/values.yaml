# dynamo-platform 1.1.0 values that actually bring up etcd on a fresh cluster.
# WHY: the chart gates etcd behind `global.etcd.install` (Chart.yaml condition),
# and the DEFAULT is `false` (values.yaml). A bare `helm install` therefore
# renders operator + nats but NO etcd. This file flips
# that gate on and pins the etcd image to the bitnamilegacy mirror (Bitnami
# relocated docker.io/bitnami/* in 2025; the chart default bitnami/etcd:3.6.4
# can ImagePullBackOff). Matches the values of a verified-working deploy.
dynamo-operator:
  enabled: true
nats:
  enabled: true
  config:
    cluster: { enabled: false }
    jetstream: { enabled: true }
global:
  etcd:
    install: true            # <-- THE fix: default is false, so etcd never renders
  grove:        { enabled: false, install: false }
  kai-scheduler: { enabled: false, install: false }
etcd:
  replicaCount: 1
  auth:
    rbac:  { create: false }
    token: { enabled: false }
  persistence:
    enabled: true
    size: 1Gi
    storageClass: gp2        # set to your cluster's default StorageClass
  # Image override - preempts the post-relocation bitnami/etcd pull failure.
  # Our verified-working pod runs this exact image.
  image:
    registry: docker.io
    repository: bitnamilegacy/etcd
    tag: 3.5.18-debian-12-r5
