# GDRCopy Installer DaemonSet for Amazon Linux 2023
# Installs GDRCopy kernel module (gdrdrv) on AL2023 GPU nodes
# since GPU Operator's GDRCopy sidecar only supports Ubuntu 22.04 and RHCOS
#
# Prerequisites:
# - Set gdrcopy.enabled=false in GPU Operator ClusterPolicy
# - AL2023 GPU nodes with preinstalled NVIDIA drivers
#
# Usage:
#   kubectl apply -f gdrcopy-installer-daemonset.yaml
#   kubectl -n gpu-operator get pods -l app=gdrcopy-installer
#   kubectl -n gpu-operator logs -l app=gdrcopy-installer -c install-gdrcopy
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gdrcopy-installer
  namespace: gpu-operator
  labels:
    app: gdrcopy-installer
spec:
  selector:
    matchLabels:
      app: gdrcopy-installer
  template:
    metadata:
      labels:
        app: gdrcopy-installer
    spec:
      hostPID: true
      hostNetwork: true
      nodeSelector:
        # Only run on AL2023 GPU nodes
        feature.node.kubernetes.io/system-os_release.ID: amzn
        feature.node.kubernetes.io/system-os_release.VERSION_ID: "2023"
        nvidia.com/gpu.present: "true"
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "karpenter.sh/disrupted"
        operator: "Exists"
        effect: "NoSchedule"
      initContainers:
      - name: install-gdrcopy
        image: amazonlinux:2023
        securityContext:
          privileged: true
        env:
        - name: GDRCOPY_VERSION
          value: "2.5.1"
        - name: NVIDIA_DRIVER_VERSION
          value: "580.105.08"
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -e
          echo "=== GDRCopy Installer for AL2023 ==="
          echo "GDRCopy Version: ${GDRCOPY_VERSION}"
          echo "NVIDIA Driver Version: ${NVIDIA_DRIVER_VERSION}"
          echo ""

          # Get kernel version
          KERNEL_VERSION=$(uname -r)
          echo "Kernel Version: ${KERNEL_VERSION}"

          # Install util-linux for nsenter first
          dnf -y install util-linux > /dev/null 2>&1

          # Helper function to ensure gdrdrv is loaded and device exists
          ensure_gdrdrv_device() {
            echo "Ensuring gdrdrv module is loaded and device exists..."
            nsenter --target 1 --mount --uts --ipc --net -- modprobe gdrdrv || return 1

            if ! nsenter --target 1 --mount --uts --ipc --net -- test -c /dev/gdrdrv; then
              echo "Creating /dev/gdrdrv device node..."
              MAJOR=$(nsenter --target 1 --mount --uts --ipc --net -- cat /proc/devices | grep gdrdrv | awk '{print $1}')
              nsenter --target 1 --mount --uts --ipc --net -- mknod /dev/gdrdrv c ${MAJOR:-237} 0
              nsenter --target 1 --mount --uts --ipc --net -- chmod 666 /dev/gdrdrv
            fi

            nsenter --target 1 --mount --uts --ipc --net -- ls -la /dev/gdrdrv
            return 0
          }

          # Check if gdrdrv already loaded on host
          if nsenter --target 1 --mount --uts --ipc --net -- lsmod 2>/dev/null | grep -q "^gdrdrv"; then
            echo "gdrdrv module already loaded on host"
            ensure_gdrdrv_device
            echo "=== SUCCESS: GDRCopy already running ==="
            exit 0
          fi

          # Check if gdrdrv already installed in DKMS (just needs to be loaded)
          if nsenter --target 1 --mount --uts --ipc --net -- dkms status 2>/dev/null | grep -q "gdrdrv.*${GDRCOPY_VERSION}.*installed"; then
            echo "gdrdrv module already installed in DKMS, just need to load it"
            ensure_gdrdrv_device
            echo "=== SUCCESS: GDRCopy loaded from existing DKMS installation ==="
            exit 0
          fi

          echo ""
          echo "=== Step 1: Install tools in container ==="
          dnf -y install wget cpio

          echo ""
          echo "=== Step 2: Install kernel-devel on HOST ==="
          # For AL2023 kernel 6.12, package is kernel6.12-devel (not kernel-devel)
          nsenter --target 1 --mount --uts --ipc --net -- bash -c "
            KERNEL_VERSION=${KERNEL_VERSION}
            echo 'Installing kernel-devel for kernel: ${KERNEL_VERSION}'

            # Determine if kernel 6.12 (uses kernel6.12-devel) or 6.1 (uses kernel-devel)
            if echo ${KERNEL_VERSION} | grep -q '^6\.12'; then
              echo 'Detected kernel 6.12, using kernel6.12-devel packages'
              dnf -y install kernel6.12-devel-${KERNEL_VERSION} kernel6.12-headers-${KERNEL_VERSION} || {
                echo 'Exact version not found, trying latest kernel6.12-devel'
                dnf -y install kernel6.12-devel kernel6.12-headers
              }
            else
              echo 'Detected kernel 6.1, using kernel-devel packages'
              dnf -y install kernel-devel-${KERNEL_VERSION} kernel-headers-${KERNEL_VERSION} || {
                echo 'Exact version not found, trying latest kernel-devel'
                dnf -y install kernel-devel kernel-headers
              }
            fi

            echo ''
            echo 'Installed kernel headers:'
            ls -la /usr/src/kernels/ 2>/dev/null | head -5 || echo 'No kernels in /usr/src/kernels'
          "

          # Create NVIDIA symlink on HOST (GDRCopy expects /usr/src/nvidia-* but AL2023 has nvidia-open-*)
          nsenter --target 1 --mount --uts --ipc --net -- bash -c "
            if [ -d /usr/src/nvidia-open-${NVIDIA_DRIVER_VERSION} ] && [ ! -e /usr/src/nvidia-${NVIDIA_DRIVER_VERSION} ]; then
              ln -sfv /usr/src/nvidia-open-${NVIDIA_DRIVER_VERSION} /usr/src/nvidia-${NVIDIA_DRIVER_VERSION}
            else
              echo 'NVIDIA symlink already exists or source not found:'
              ls -la /usr/src/nvidia* 2>/dev/null | head -5 || true
            fi
          "

          echo ""
          echo "=== Step 4: Download GDRCopy RPMs ==="
          cd /tmp
          BASE_URL="https://developer.download.nvidia.com/compute/redist/gdrcopy/CUDA%2012.8/rhel9/x64"

          wget -q ${BASE_URL}/gdrcopy-kmod-${GDRCOPY_VERSION}-1dkms.el9.noarch.rpm
          wget -q ${BASE_URL}/gdrcopy-${GDRCOPY_VERSION}-1.el9.x86_64.rpm
          wget -q ${BASE_URL}/gdrcopy-devel-${GDRCOPY_VERSION}-1.el9.noarch.rpm

          echo "Downloaded:"
          ls -la gdrcopy*.rpm

          echo ""
          echo "=== Step 5: Extract and install GDRCopy on HOST ==="
          # Extract RPMs manually to avoid post-install script issues

          # Extract DKMS source from kmod RPM
          mkdir -p /tmp/gdrcopy-extract
          cd /tmp/gdrcopy-extract
          rpm2cpio ../gdrcopy-kmod-${GDRCOPY_VERSION}-1dkms.el9.noarch.rpm | cpio -idmv
          rpm2cpio ../gdrcopy-${GDRCOPY_VERSION}-1.el9.x86_64.rpm | cpio -idmv

          echo "Extracted directory structure:"
          ls -laR . | head -50

          # Copy DKMS source to host (source dir is gdrdrv-VERSION, not gdrcopy-VERSION)
          echo ""
          echo "Copying DKMS source to host..."
          if [ -d usr/src/gdrdrv-${GDRCOPY_VERSION} ]; then
            # Remove any existing directory first
            rm -rf /host/usr/src/gdrdrv-${GDRCOPY_VERSION}
            # Copy the entire directory
            cp -r usr/src/gdrdrv-${GDRCOPY_VERSION} /host/usr/src/gdrdrv-${GDRCOPY_VERSION}
          else
            echo "ERROR: DKMS source not found in extracted RPM"
            ls -la usr/src/ 2>/dev/null || echo "No usr/src directory"
            exit 1
          fi

          # Copy userspace libraries/binaries if present
          [ -d usr/lib64 ] && cp -r usr/lib64/* /host/usr/lib64/ 2>/dev/null || true
          [ -d usr/bin ] && cp -r usr/bin/* /host/usr/bin/ 2>/dev/null || true

          echo ""
          echo "Checking DKMS source on host:"
          ls -la /host/usr/src/gdrdrv-* 2>/dev/null || echo "No gdrdrv source found"

          echo ""
          echo "=== Step 6: Build and install DKMS module on host ==="
          # Run DKMS commands on host via nsenter
          # Note: DKMS module name is 'gdrdrv' (not 'gdrcopy')
          # For nvidia-open, the source is in kernel-open/nvidia subdirectory
          nsenter --target 1 --mount --uts --ipc --net -- bash -c "
            set -e

            # Find the correct NVIDIA source directory (where nv-p2p.c lives)
            export NVIDIA_SRC_DIR=\$(find /usr/src/nvidia-* /usr/src/nvidia-open-* -name 'nv-p2p.c' -print -quit 2>/dev/null | xargs dirname)
            echo \"Using NVIDIA_SRC_DIR=\$NVIDIA_SRC_DIR\"

            echo ''
            echo 'DKMS status before:'
            dkms status || true

            echo ''
            echo 'Building gdrdrv DKMS module...'
            # Add and build module (module name is gdrdrv, not gdrcopy)
            if ! dkms status | grep -q 'gdrdrv/${GDRCOPY_VERSION}.*installed'; then
              dkms add -m gdrdrv -v ${GDRCOPY_VERSION} 2>/dev/null || true
              dkms build -m gdrdrv -v ${GDRCOPY_VERSION} -k ${KERNEL_VERSION} || {
                echo 'DKMS build failed, checking logs...'
                cat /var/lib/dkms/gdrdrv/${GDRCOPY_VERSION}/build/make.log 2>/dev/null || true
                exit 1
              }
              dkms install -m gdrdrv -v ${GDRCOPY_VERSION} -k ${KERNEL_VERSION} || {
                echo 'DKMS install failed, checking status...'
                dkms status
                exit 1
              }
            fi

            echo ''
            echo 'DKMS status after:'
            dkms status
          "

          echo ""
          echo "=== Step 7: Load gdrdrv module and create device ==="
          ensure_gdrdrv_device

          echo ""
          echo "=== Step 8: Verify ==="
          echo "lsmod:"
          nsenter --target 1 --mount --uts --ipc --net -- lsmod | grep -E "^gdrdrv|^nvidia" | head -5

          echo ""
          echo "=== SUCCESS: GDRCopy installed and /dev/gdrdrv created ==="
        volumeMounts:
        - name: host-root
          mountPath: /host
          readOnly: false
        - name: host-src
          mountPath: /host-src
          readOnly: false
        - name: host-lib-modules
          mountPath: /lib/modules
          readOnly: true
      containers:
      - name: monitor
        image: amazonlinux:2023
        command: ["/bin/bash", "-c"]
        args:
        - |
          echo "GDRCopy installer completed successfully"
          echo "Monitoring gdrdrv module status..."
          echo ""
          while true; do
            if chroot /host lsmod | grep -q "^gdrdrv"; then
              echo "$(date '+%Y-%m-%d %H:%M:%S'): gdrdrv module is loaded"
            else
              echo "$(date '+%Y-%m-%d %H:%M:%S'): WARNING - gdrdrv module not loaded, attempting reload..."
              chroot /host modprobe gdrdrv || true
            fi
            sleep 300
          done
        volumeMounts:
        - name: host-root
          mountPath: /host
          readOnly: false
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
      volumes:
      - name: host-root
        hostPath:
          path: /
      - name: host-src
        hostPath:
          path: /usr/src
      - name: host-lib-modules
        hostPath:
          path: /lib/modules
