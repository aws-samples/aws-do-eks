apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpu-driver-installer
  namespace: kube-system
  labels:
    app.kubernetes.io/name: "gpu-driver-installer"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: "gpu-driver-installer"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "gpu-driver-installer"
      name: "gpu-driver-installer"
    spec:
      hostPID: true
      hostNetwork: true
      nodeSelector:
        node.kubernetes.io/instance-type: "g7e.12xlarge"
        #processor: gpu
      initContainers:
      - name: "installer"
        image: "ubuntu:24.04"
        env:
        #command: ["bash", "-c", "while true; do date; sleep 10; done"]
        command: ["nsenter", "--target", "1", "--mount", "--uts", "--ipc", "--net", "--pid", "--","bash", "-c", "echo  | base64 -d > /tmp/install-gpu-driver-al2023.sh; chmod +x /tmp/install-gpu-driver-al2023.sh; /tmp/install-gpu-driver-al2023.sh"]
        securityContext:
          privileged: true
          runAsNonRoot: false
          runAsUser: 0
      containers:
      - name: "monitor"
        image: "ubuntu:24.04"
        command: ["nsenter", "--target", "1", "--mount", "--uts", "--ipc", "--net", "--pid", "--", "/bin/bash", "-c"]
        args: 
        - |
          while true; do 
            echo "gpu driver installer pod is alive on $(date)"
            echo "GPU devices:"
            nvidia-smi 
            sleep 300
          done
        securityContext:
          privileged: true
          runAsNonRoot: false
          runAsUser: 0

