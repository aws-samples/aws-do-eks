apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gdrcopy-installer
  namespace: kube-system
  labels:
    app.kubernetes.io/name: "gdrcopy-installer"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: "gdrcopy-installer"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "gdrcopy-installer"
      name: "gdrcopy-installer"
    spec:
      hostPID: true
      hostNetwork: true
      nodeSelector:
        node.kubernetes.io/instance-type: "p5en.48xlarge"
        #processor: gpu
      initContainers:
      - name: "installer"
        image: "ubuntu:24.04"
        env:
        - name: GDRCOPY_VERSION
          value: "2.4.1"
        - name: REINSTALL
          value: "Y"
        #command: ["bash", "-c", "while true; do date; sleep 10; done"]
        command: ["nsenter", "--target", "1", "--mount", "--uts", "--ipc", "--net", "--pid", "--","bash", "-c", "echo  | base64 -d > /tmp/install-gdrcopy-al2023.sh; chmod +x /tmp/install-gdrcopy-al2023.sh; /tmp/install-gdrcopy-al2023.sh"]
        securityContext:
          privileged: true
          runAsNonRoot: false
          runAsUser: 0
      containers:
      - name: "monitor"
        image: "ubuntu:24.04"
        command: ["nsenter", "--target", "1", "--mount", "--uts", "--ipc", "--net", "--pid", "--", "/bin/bash", "-c"]
        args: 
        - |
          while true; do 
            echo "gdrcopy installer pod is alive on $(date)"
            echo "GPU devices:"
            nvidia-smi -L
            echo "GDRCopy module:"
            lsmod | grep gdrdrv
            echo "GDRCopy device:"
            ls -alh /dev/gdrdrv
            echo "GDRCopy driver:"
            ls -alh /lib/modules/$(uname -r)/kernel/drivers/misc/gdr*
            echo "GDRCopy library:"
            ls -alh /usr/lib64/libgdr*
            sleep 300
          done
        securityContext:
          privileged: true
          runAsNonRoot: false
          runAsUser: 0

