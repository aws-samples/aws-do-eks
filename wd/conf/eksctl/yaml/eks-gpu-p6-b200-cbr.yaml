apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: do-eks-yaml-p6-b200-cbr
  version: "1.35"
  region: us-east-2
  tags:
    karpenter.sh/discovery: do-eks-yaml-p6-b200-cbr

availabilityZones:
  - us-east-2a
  - us-east-2b
  - us-east-2c

managedNodeGroups:

  - name: sys
    instanceType: m5.8xlarge
    desiredCapacity: 1
    iam:
      withAddonPolicies:
        autoScaler: true
        cloudWatch: true

  - name: p6-b200-cbr
    instanceType: p6-b200.48xlarge
    instancePrefix: p6-b200-cbr
    privateNetworking: true
    availabilityZones: ["us-east-2a"]
    efaEnabled: true
    minSize: 0
    desiredCapacity: 2
    maxSize: 128
    volumeSize: 500
    capacityReservation:
      capacityReservationTarget:
        capacityReservationID: "cr-xxxxxxxxxxxx"
    instanceMarketOptions:
      marketType: "capacity-block"
    iam:
      withAddonPolicies:
        cloudWatch: true
        ebs: true
        fsx: true

iam:
  withOIDC: true
