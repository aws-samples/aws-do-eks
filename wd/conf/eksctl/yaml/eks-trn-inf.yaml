apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: do-eks-yaml-trn-inf
  version: "1.35"
  region: us-east-2
  tags:
    karpenter.sh/discovery: do-eks-yaml-trn-inf

availabilityZones:
  - us-east-2a
  - us-east-2b
  - us-east-2c

managedNodeGroups:

  - name: sys
    instanceType: c5.2xlarge
    desiredCapacity: 1
    iam:
      withAddonPolicies:
        autoScaler: true
        cloudWatch: true
        ebs: true
        efs: true
        fsx: true
 
  - name: trn1n
    instanceType: trn1n.32xlarge
    instancePrefix: trn1n
    privateNetworking: true
    efaEnabled: true
    minSize: 0
    desiredCapacity: 1
    maxSize: 10
    volumeSize: 900
    iam:
      withAddonPolicies:
        cloudWatch: true
        ebs: true
        efs: true
        fsx: true

  - name: inf2
    instanceType: inf2.8xlarge
    instancePrefix: inf2
    privateNetworking: true
    efaEnabled: false
    minSize: 0
    desiredCapacity: 1
    maxSize: 10
    volumeSize: 900
    iam:
      withAddonPolicies:
        cloudWatch: true
        ebs: true
        efs: true
        fsx: true

iam:
  withOIDC: true
