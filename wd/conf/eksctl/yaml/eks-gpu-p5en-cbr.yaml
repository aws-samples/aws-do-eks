apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: do-eks-yaml-p5en-cbr
  version: "1.35"
  region: us-east-2
  tags:
    karpenter.sh/discovery: do-eks-yaml-p5en-cbr

availabilityZones:
  - us-east-2a
  - us-east-2b
  - us-east-2c

managedNodeGroups:

  - name: sys
    instanceType: m5.8xlarge
    desiredCapacity: 1
    volumeSize: 300
    availabilityZones: ["us-east-2a"]
    iam:
      withAddonPolicies:
        cloudWatch: true
        ebs: true
        fsx: true

# Uncomment the line below if you prefer an unmanaged gpu nodegroup
#nodeGroups: 

  - name: p5en-cbr
    instanceType: p5en.48xlarge
    instancePrefix: p5en-cbr
    privateNetworking: true
    availabilityZones: ["us-east-2a"]
    efaEnabled: true
    minSize: 0
    desiredCapacity: 2
    maxSize: 8
    volumeSize: 500
    capacityReservation:
      capacityReservationTarget:
        capacityReservationID: "cr-xxxxxxxxxxxx"
    instanceMarketOptions:
      marketType: "capacity-block"
    iam:
      withAddonPolicies:
        cloudWatch: true
        ebs: true
        fsx: true

iam:
  withOIDC: true

