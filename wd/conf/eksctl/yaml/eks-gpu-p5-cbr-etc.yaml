apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: do-eks-yaml-p5-cbr
  version: "1.35"
  region: us-west-2
  tags:
    karpenter.sh/discovery: do-eks-yaml-p5-cbr

availabilityZones:
  - us-west-2a
  - us-west-2b
  - us-west-2c

managedNodeGroups:

  - name: sys
    instanceType: c5.2xlarge
    desiredCapacity: 1
    iam:
      withAddonPolicies:
        autoScaler: true
        cloudWatch: true
 
#nodeGroups: 
#  - name: g5-2xl
#    instanceType: g5.2xlarge
#    privateNetworking: true
#    availabilityZones: ["us-west-2a","us-west-2b","us-west-2c"]
#    minSize: 0
#    desiredCapacity: 1
#    maxSize: 8
#    volumeSize: 300
#    iam:
#      withAddonPolicies:
#        cloudWatch: true
#        ebs: true
#        fsx: true

  - name: p5e-cbr-mng
    instanceType: p5e.48xlarge
    instancePrefix: p5e-cbr
    privateNetworking: true
    availabilityZones: ["us-west-2c"]
    efaEnabled: true
    minSize: 0
    desiredCapacity: 2
    maxSize: 8
    volumeSize: 500
    capacityReservation:
      capacityReservationTarget:
        capacityReservationID: "cr-xxxxxxxxxxxxxxxxx"
    instanceMarketOptions:
      marketType: "capacity-block"
    iam:
      withAddonPolicies:
        cloudWatch: true
        ebs: true
        fsx: true

iam:
  withOIDC: true
